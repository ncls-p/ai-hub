services:
  migrate:
    build:
      context: .
      target: migrator
    environment:
      APP_ENV: production
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_ENCRYPTION_KEY_ID: ${APP_ENCRYPTION_KEY_ID}
      DRAGONFLY_URL: ${DRAGONFLY_URL:-redis://dragonflydb:6379}
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      APP_ENV: production
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_ENCRYPTION_KEY_ID: ${APP_ENCRYPTION_KEY_ID}
      DRAGONFLY_URL: ${DRAGONFLY_URL:-redis://dragonflydb:6379}
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    environment:
      APP_ENV: production
      NODE_ENV: production
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      APP_ENCRYPTION_KEY_ID: ${APP_ENCRYPTION_KEY_ID}
      DRAGONFLY_URL: ${DRAGONFLY_URL:-redis://dragonflydb:6379}
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    command: ["--requirepass", "${DRAGONFLY_PASSWORD}"]
    volumes:
      - dragonfly_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${DRAGONFLY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  garage:
    image: rustfs/rustfs:latest
    command: server /data --address ":9000" --console-address ":9001"
    volumes:
      - garage_data_prod:/data
    environment:
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  garage-init:
    image: minio/mc:latest
    depends_on:
      garage:
        condition: service_healthy
    environment:
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
    entrypoint: >
      sh -c "
        mc alias set local http://garage:9000 $${OBJECT_STORAGE_ACCESS_KEY_ID} $${OBJECT_STORAGE_SECRET_ACCESS_KEY} &&
        mc mb --ignore-existing local/$${OBJECT_STORAGE_BUCKET} &&
        echo 'Object storage bucket initialized'
      "
    restart: "no"

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
    restart: unless-stopped

volumes:
  postgres_prod:
  dragonfly_prod:
  garage_data_prod:
