name: ai-hub

services:
  migrate:
    image: ${AI_HUB_MIGRATOR_IMAGE:?set AI_HUB_MIGRATOR_IMAGE}
    environment: &app-environment
      APP_ENV: production
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://maiah.shiftify.eco}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-https://maiah.shiftify.eco}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_hub}
      DATABASE_SSL_REJECT_UNAUTHORIZED: disable
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY}
      APP_ENCRYPTION_KEY_ID: ${APP_ENCRYPTION_KEY_ID:-default}
      DRAGONFLY_URL: redis://dragonflydb:6379
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD:?set DRAGONFLY_PASSWORD}
      OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
      CODE_WORKSPACE_STORAGE_PREFIX: ${CODE_WORKSPACE_STORAGE_PREFIX:-code-workspaces}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      OPENSANDBOX_DOMAIN: ${OPENSANDBOX_DOMAIN:-opensandbox-server:8090}
      OPENSANDBOX_PROTOCOL: ${OPENSANDBOX_PROTOCOL:-http}
      OPENSANDBOX_API_KEY: ${OPENSANDBOX_API_KEY:?set OPENSANDBOX_API_KEY}
      OPENSANDBOX_IMAGE: ${OPENSANDBOX_IMAGE:-opensandbox/code-interpreter:v1.1.0}
      OPENSANDBOX_USE_SERVER_PROXY: ${OPENSANDBOX_USE_SERVER_PROXY:-false}
      ALLOW_PERSONAL_WORKSPACES: ${ALLOW_PERSONAL_WORKSPACES:-true}
      WORKSPACE_MONTHLY_TOKEN_LIMIT: ${WORKSPACE_MONTHLY_TOKEN_LIMIT:-}
    depends_on:
      rustfs-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ${AI_HUB_APP_IMAGE:?set AI_HUB_APP_IMAGE}
    environment:
      <<: *app-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      dragonflydb:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
      opensandbox-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  worker:
    image: ${AI_HUB_WORKER_IMAGE:?set AI_HUB_WORKER_IMAGE}
    environment:
      <<: *app-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      dragonflydb:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
      opensandbox-server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  opensandbox-images:
    image: docker:27-cli
    restart: "no"
    environment:
      OPENSANDBOX_IMAGE: ${OPENSANDBOX_IMAGE:-opensandbox/code-interpreter:v1.1.0}
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        docker pull "$${OPENSANDBOX_IMAGE}"
        docker pull opensandbox/execd:v1.0.20
        docker pull opensandbox/egress:v1.1.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  opensandbox-server:
    image: opensandbox/server:latest
    depends_on:
      opensandbox-images:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - opensandbox-data:/root/.opensandbox
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        cat > /tmp/opensandbox-config.toml <<'TOML'
        [server]
        host = "0.0.0.0"
        port = 8090
        max_sandbox_timeout_seconds = 900

        [log]
        level = "INFO"

        [runtime]
        type = "docker"
        execd_image = "opensandbox/execd:v1.0.20"

        [storage]
        allowed_host_paths = []
        volume_default_size = "1Gi"

        [store]
        type = "sqlite"
        path = "~/.opensandbox/opensandbox.db"

        [docker]
        network_mode = "bridge"
        host_ip = "host.docker.internal"
        drop_capabilities = ["AUDIT_WRITE", "MKNOD", "NET_ADMIN", "NET_RAW", "SYS_ADMIN", "SYS_MODULE", "SYS_PTRACE", "SYS_TIME", "SYS_TTY_CONFIG"]
        no_new_privileges = true
        apparmor_profile = ""
        pids_limit = 4096
        seccomp_profile = ""

        [ingress]
        mode = "direct"

        [egress]
        image = "opensandbox/egress:v1.1.3"
        mode = "dns"

        [renew_intent]
        enabled = false
        min_interval_seconds = 60
        TOML
        exec opensandbox-server --config /tmp/opensandbox-config.toml
    environment:
      SANDBOX_CONFIG_PATH: /tmp/opensandbox-config.toml
      OPENSANDBOX_SERVER_API_KEY: ${OPENSANDBOX_API_KEY:?set OPENSANDBOX_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.10"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ai_hub}
      interval: 5s
      timeout: 5s
      retries: 20

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    command: ["--requirepass", "${DRAGONFLY_PASSWORD:?set DRAGONFLY_PASSWORD}"]
    environment:
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD:?set DRAGONFLY_PASSWORD}
    volumes:
      - dragonfly-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${DRAGONFLY_PASSWORD}" ping | grep -q PONG
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: ["/data"]
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "false"
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}
    volumes:
      - rustfs-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          code="$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/)" && { test "$$code" = "200" || test "$$code" = "403"; }
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs-init:
    image: amazon/aws-cli:2.32.3
    depends_on:
      rustfs:
        condition: service_healthy
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        endpoint="http://rustfs:9000"
        for attempt in $$(seq 1 30); do
          if aws --endpoint-url "$$endpoint" s3api list-buckets >/dev/null 2>&1; then
            break
          fi
          if [ "$$attempt" = "30" ]; then
            echo "RustFS S3 API was not ready after 30 attempts." >&2
            exit 1
          fi
          sleep 1
        done
        if ! aws --endpoint-url "$$endpoint" s3api head-bucket --bucket "$${AWS_BUCKET}" >/dev/null 2>&1; then
          aws --endpoint-url "$$endpoint" s3api create-bucket --bucket "$${AWS_BUCKET}"
        fi

  searxng:
    image: ${AI_HUB_SEARXNG_IMAGE:?set AI_HUB_SEARXNG_IMAGE}
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET}
      SEARXNG_SETTINGS_REVISION: ${SEARXNG_SETTINGS_REVISION:-local}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        /usr/local/searxng/.venv/bin/python - <<'PY'
        from pathlib import Path

        import yaml

        blocked = {"woxikon.de synonyme", "wikimini"}
        for settings_path in (Path("/usr/local/searxng/searx/settings.yml"), Path("/etc/searxng/settings.yml")):
            if not settings_path.exists():
                continue
            settings = yaml.safe_load(settings_path.read_text(encoding="utf-8")) or {}
            engines = settings.get("engines")
            if isinstance(engines, list):
                settings["engines"] = [engine for engine in engines if engine.get("name") not in blocked]
            use_default_settings = settings.get("use_default_settings")
            if use_default_settings is True:
                settings["use_default_settings"] = {"engines": {"remove": sorted(blocked)}}
            elif isinstance(use_default_settings, dict):
                remove = use_default_settings.setdefault("engines", {}).setdefault("remove", [])
                for engine_name in sorted(blocked):
                    if engine_name not in remove:
                        remove.append(engine_name)
            settings_path.write_text(yaml.safe_dump(settings, allow_unicode=True, sort_keys=False), encoding="utf-8")
        PY
        exec /usr/local/searxng/entrypoint.sh
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -q -O /dev/null --header='X-Forwarded-For: 127.0.0.1' --header='X-Real-IP: 127.0.0.1' http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5


volumes:
  dragonfly-data:
  rustfs-data:
  postgres-data:
  opensandbox-data:
