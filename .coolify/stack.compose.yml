name: ai-hub

services:
  migrate:
    image: ${AI_HUB_MIGRATOR_IMAGE:?set AI_HUB_MIGRATOR_IMAGE}
    environment: &app-environment
      APP_ENV: production
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://maiah.shiftify.eco}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-https://maiah.shiftify.eco}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ai_hub}
      DATABASE_SSL_REJECT_UNAUTHORIZED: disable
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY}
      APP_ENCRYPTION_KEY_ID: ${APP_ENCRYPTION_KEY_ID:-default}
      DRAGONFLY_URL: redis://dragonflydb:6379
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD:?set DRAGONFLY_PASSWORD}
      OBJECT_STORAGE_ENDPOINT: http://garage:3900
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-garage}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
      CODE_WORKSPACE_STORAGE_PREFIX: ${CODE_WORKSPACE_STORAGE_PREFIX:-code-workspaces}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      ALLOW_PERSONAL_WORKSPACES: ${ALLOW_PERSONAL_WORKSPACES:-true}
      WORKSPACE_MONTHLY_TOKEN_LIMIT: ${WORKSPACE_MONTHLY_TOKEN_LIMIT:-}
    depends_on:
      garage-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: ${AI_HUB_APP_IMAGE:?set AI_HUB_APP_IMAGE}
    environment:
      <<: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      dragonflydb:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  worker:
    image: ${AI_HUB_WORKER_IMAGE:?set AI_HUB_WORKER_IMAGE}
    environment:
      <<: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      dragonflydb:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
      searxng:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ai_hub}
      interval: 5s
      timeout: 5s
      retries: 20

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    command: ["--requirepass", "${DRAGONFLY_PASSWORD:?set DRAGONFLY_PASSWORD}"]
    environment:
      DRAGONFLY_PASSWORD: ${DRAGONFLY_PASSWORD:?set DRAGONFLY_PASSWORD}
    volumes:
      - dragonfly-data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$${DRAGONFLY_PASSWORD}" ping | grep -q PONG
      interval: 5s
      timeout: 5s
      retries: 20

  garage:
    image: ${AI_HUB_GARAGE_IMAGE:?set AI_HUB_GARAGE_IMAGE}
    restart: unless-stopped
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    volumes:
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "node", "id"]
      interval: 5s
      timeout: 5s
      retries: 20

  garage-init:
    image: ${AI_HUB_GARAGE_INIT_IMAGE:?set AI_HUB_GARAGE_INIT_IMAGE}
    depends_on:
      garage:
        condition: service_healthy
    restart: "no"
    environment:
      GARAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:?set OBJECT_STORAGE_ACCESS_KEY_ID}
      GARAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
      GARAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:?set OBJECT_STORAGE_SECRET_ACCESS_KEY}
    volumes:
      - garage-meta:/var/lib/garage/meta:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if ! printf '%s' "$$GARAGE_ACCESS_KEY_ID" | grep -Eq '^GK[[:xdigit:]]{24}$$'; then
          echo "GARAGE_ACCESS_KEY_ID must be a real Garage access key: GK followed by exactly 24 hexadecimal characters." >&2
          exit 1
        fi
        if ! printf '%s' "$$GARAGE_SECRET_ACCESS_KEY" | grep -Eq '^[[:xdigit:]]{64}$$'; then
          echo "GARAGE_SECRET_ACCESS_KEY must be a 64-character hexadecimal secret." >&2
          exit 1
        fi
        NODE_ID=""
        for attempt in $$(seq 1 10); do
          NODE_ID="$(/garage -c /etc/garage.toml node id 2>/dev/null | sed -n 's/^\([0-9a-f][0-9a-f]*\)@.*/\1/p' | head -n 1)"
          if [ -n "$$NODE_ID" ]; then
            break
          fi
          sleep 1
        done
        if [ -z "$$NODE_ID" ]; then
          echo "Unable to determine Garage node ID" >&2
          exit 1
        fi
        /garage -c /etc/garage.toml layout assign -z dc1 -c 1G "$$NODE_ID" >/dev/null 2>&1 || true
        /garage -c /etc/garage.toml layout apply --version 1 >/dev/null 2>&1 || true
        /garage -c /etc/garage.toml bucket create "$$GARAGE_BUCKET" >/dev/null 2>&1 || true
        if ! /garage -c /etc/garage.toml key info "$$GARAGE_ACCESS_KEY_ID" >/dev/null 2>&1; then
          /garage -c /etc/garage.toml key import --yes -n ai-hub "$$GARAGE_ACCESS_KEY_ID" "$$GARAGE_SECRET_ACCESS_KEY"
        fi
        for attempt in $$(seq 1 10); do
          if /garage -c /etc/garage.toml key info "$$GARAGE_ACCESS_KEY_ID" >/dev/null 2>&1; then
            break
          fi
          if [ "$$attempt" = "10" ]; then
            echo "Garage access key was not available after import." >&2
            exit 1
          fi
          sleep 1
        done
        /garage -c /etc/garage.toml bucket allow --read --write --owner "$$GARAGE_BUCKET" --key "$$GARAGE_ACCESS_KEY_ID"

  searxng:
    image: ${AI_HUB_SEARXNG_IMAGE:?set AI_HUB_SEARXNG_IMAGE}
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://searxng:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:?set SEARXNG_SECRET}
      SEARXNG_SETTINGS_REVISION: ${SEARXNG_SETTINGS_REVISION:-local}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        /usr/local/searxng/.venv/bin/python - <<'PY'
        from pathlib import Path

        import yaml

        blocked = {"woxikon.de synonyme", "wikimini"}
        for settings_path in (Path("/usr/local/searxng/searx/settings.yml"), Path("/etc/searxng/settings.yml")):
            if not settings_path.exists():
                continue
            settings = yaml.safe_load(settings_path.read_text(encoding="utf-8")) or {}
            engines = settings.get("engines")
            if isinstance(engines, list):
                settings["engines"] = [engine for engine in engines if engine.get("name") not in blocked]
            use_default_settings = settings.get("use_default_settings")
            if use_default_settings is True:
                settings["use_default_settings"] = {"engines": {"remove": sorted(blocked)}}
            elif isinstance(use_default_settings, dict):
                remove = use_default_settings.setdefault("engines", {}).setdefault("remove", [])
                for engine_name in sorted(blocked):
                    if engine_name not in remove:
                        remove.append(engine_name)
            settings_path.write_text(yaml.safe_dump(settings, allow_unicode=True, sort_keys=False), encoding="utf-8")
        PY
        exec /usr/local/searxng/entrypoint.sh
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          wget -q -O /dev/null --header='X-Forwarded-For: 127.0.0.1' --header='X-Real-IP: 127.0.0.1' http://127.0.0.1:8080/healthz
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  dragonfly-data:
  garage-data:
  garage-meta:
  postgres-data:
