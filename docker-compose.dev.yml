services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ai_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "16379:6379"
    volumes:
      - dragonfly_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  garage:
    image: minio/minio:latest
    command: server /data --address ":3900" --console-address ":3901"
    ports:
      - "13900:3900"
      - "13901:3901"
    volumes:
      - garage_data_dev:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  garage-init:
    image: minio/mc:latest
    depends_on:
      garage:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://garage:3900 minioadmin minioadmin &&
        mc mb --ignore-existing local/ai-hub &&
        echo 'Object storage bucket initialized'
      "
    restart: "no"

  searxng:
    image: searxng/searxng:latest
    ports:
      - "18088:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:18088/
    restart: unless-stopped

volumes:
  postgres_dev:
  dragonfly_dev:
  garage_data_dev:
