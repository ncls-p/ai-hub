services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  garage:
    image: adobe/garage:latest
    ports:
      - "3900:3900"
    volumes:
      - garage_metadata_dev:/garage
      - garage_data_dev:/data
    environment:
      GARAGE_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/"]
      interval: 10s
      timeout: 5s
      retries: 10

  garage-init:
    image: curlimages/curl:latest
    depends_on:
      garage:
        condition: service_healthy
    environment:
      GARAGE_ACCESS_KEY: minioadmin
      GARAGE_SECRET_KEY: minioadmin
      GARAGE_BUCKET: ai-hub
    entrypoint: >
      sh -c "
        curl -X PUT http://garage:3900/ai-hub &&
        curl -X PUT http://garage:3900/ai-hub/.garage/config -d '{\"AccessControlList\":{\"Grant\":[{\"Grantee\":{\"URI\":\"http://acs.amazonaws.com/v2/bucket-owner\"},\"Permission\":\"FULL_CONTROL\"}]}}' &&
        echo 'Garage bucket initialized'
      "
    restart: "no"

volumes:
  postgres_dev:
  dragonfly_dev:
  garage_metadata_dev:
  garage_data_dev:
