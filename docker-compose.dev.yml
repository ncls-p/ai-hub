name: ai-hub-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${AI_HUB_DEV_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ai_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "${AI_HUB_DEV_DRAGONFLY_PORT:-16379}:6379"
    volumes:
      - dragonfly-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    command: ["/data"]
    ports:
      - "${AI_HUB_DEV_RUSTFS_S3_PORT:-13900}:9000"
      - "${AI_HUB_DEV_RUSTFS_CONSOLE_PORT:-13901}:9001"
    environment:
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-rustfsadminrustfsadmin}
    volumes:
      - rustfs-dev-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          code="$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/)" && { test "$$code" = "200" || test "$$code" = "403"; }
      interval: 5s
      timeout: 5s
      retries: 20

  rustfs-init:
    image: amazon/aws-cli:2.32.3
    depends_on:
      rustfs:
        condition: service_healthy
    restart: "no"
    environment:
      AWS_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-rustfsadmin}
      AWS_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-rustfsadminrustfsadmin}
      AWS_DEFAULT_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
      AWS_EC2_METADATA_DISABLED: "true"
      AWS_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        endpoint="http://rustfs:9000"
        for attempt in $$(seq 1 30); do
          if aws --endpoint-url "$$endpoint" s3api list-buckets >/dev/null 2>&1; then
            break
          fi
          if [ "$$attempt" = "30" ]; then
            echo "RustFS S3 API was not ready after 30 attempts." >&2
            exit 1
          fi
          sleep 1
        done
        if ! aws --endpoint-url "$$endpoint" s3api head-bucket --bucket "$${AWS_BUCKET}" >/dev/null 2>&1; then
          aws --endpoint-url "$$endpoint" s3api create-bucket --bucket "$${AWS_BUCKET}"
        fi

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${AI_HUB_DEV_SEARXNG_PORT:-18088}:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:${AI_HUB_DEV_SEARXNG_PORT:-18088}/
    restart: unless-stopped

  sandbox-runner:
    build:
      context: .
      target: sandbox-runner
    image: ${AI_HUB_SANDBOX_IMAGE:-ai-hub-sandbox-runner:local}
    restart: unless-stopped
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,size=128m,mode=1777
      - /sandbox-runs:rw,nosuid,nodev,size=512m,exec,mode=700
    volumes:
      - ./.data/sandbox-runner:/run/sandbox
    environment:
      SANDBOX_RUNNER_SOCKET: /run/sandbox/sandbox.sock
      SANDBOX_RUN_ROOT: /sandbox-runs
      SANDBOX_DEFAULT_TIMEOUT_MS: 15000
      SANDBOX_MAX_TIMEOUT_MS: 120000
      SANDBOX_SOCKET_GID: ${SANDBOX_SOCKET_GID:-1000}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - KILL
    pids_limit: 128
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.request({socketPath:process.env.SANDBOX_RUNNER_SOCKET||'/run/sandbox/sandbox.sock',path:'/health'},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.end();\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  postgres-dev-data:
  dragonfly-dev-data:
  rustfs-dev-data:
