name: ai-hub-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${AI_HUB_DEV_POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: ai_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_hub"]
      interval: 5s
      timeout: 3s
      retries: 10

  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    ports:
      - "${AI_HUB_DEV_DRAGONFLY_PORT:-16379}:6379"
    volumes:
      - dragonfly-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  garage:
    build:
      context: .
      target: garage
    restart: unless-stopped
    command: ["/garage", "-c", "/etc/garage.toml", "server"]
    ports:
      - "${AI_HUB_DEV_GARAGE_S3_PORT:-13900}:3900"
    volumes:
      - garage-dev-meta:/var/lib/garage/meta
      - garage-dev-data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "node", "id"]
      interval: 5s
      timeout: 5s
      retries: 20

  garage-init:
    build:
      context: .
      target: garage-init
    depends_on:
      garage:
        condition: service_healthy
    restart: "no"
    environment:
      GARAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-GK0123456789abcdef01234567}
      GARAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-ai-hub}
      GARAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    volumes:
      - garage-dev-meta:/var/lib/garage/meta:ro
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        if ! printf '%s' "$$GARAGE_ACCESS_KEY_ID" | grep -Eq '^GK[[:alnum:]]{24,}$$'; then
          echo "GARAGE_ACCESS_KEY_ID must be a real Garage access key, for example GK followed by at least 24 alphanumeric characters." >&2
          exit 1
        fi
        if ! printf '%s' "$$GARAGE_SECRET_ACCESS_KEY" | grep -Eq '^[[:xdigit:]]{64}$$'; then
          echo "GARAGE_SECRET_ACCESS_KEY must be a 64-character hexadecimal secret." >&2
          exit 1
        fi
        NODE_ID=""
        for attempt in $$(seq 1 10); do
          NODE_ID="$(/garage -c /etc/garage.toml node id 2>/dev/null | sed -n 's/^\([0-9a-f][0-9a-f]*\)@.*/\1/p' | head -n 1)"
          if [ -n "$$NODE_ID" ]; then
            break
          fi
          sleep 1
        done
        if [ -z "$$NODE_ID" ]; then
          echo "Unable to determine Garage node ID" >&2
          exit 1
        fi
        /garage -c /etc/garage.toml layout assign -z dc1 -c 1G "$$NODE_ID" >/dev/null 2>&1 || true
        /garage -c /etc/garage.toml layout apply --version 1 >/dev/null 2>&1 || true
        /garage -c /etc/garage.toml bucket create "$$GARAGE_BUCKET" >/dev/null 2>&1 || true
        /garage -c /etc/garage.toml key import --yes -n ai-hub "$$GARAGE_ACCESS_KEY_ID" "$$GARAGE_SECRET_ACCESS_KEY" >/dev/null 2>&1 || true
        /garage -c /etc/garage.toml bucket allow --read --write --owner "$$GARAGE_BUCKET" --key "$$GARAGE_ACCESS_KEY_ID"

  searxng:
    image: searxng/searxng:latest
    ports:
      - "${AI_HUB_DEV_SEARXNG_PORT:-18088}:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:${AI_HUB_DEV_SEARXNG_PORT:-18088}/
    restart: unless-stopped

  sandbox-runner:
    build:
      context: .
      target: sandbox-runner
    restart: unless-stopped
    network_mode: "none"
    read_only: true
    tmpfs:
      - /sandbox-runs:rw,nosuid,nodev,size=512m
      - /tmp:rw,nosuid,nodev,size=128m
    volumes:
      - ./.data/sandbox-runner:/run/sandbox
    environment:
      SANDBOX_SOCKET_GID: ${SANDBOX_SOCKET_GID:-1000}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - KILL
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "const http=require(''http'');const req=http.request({socketPath:process.env.SANDBOX_RUNNER_SOCKET||''/run/sandbox/sandbox.sock'',path:''/health''},res=>process.exit(res.statusCode===200?0:1));req.on(''error'',()=>process.exit(1));req.end();"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

volumes:
  postgres-dev-data:
  dragonfly-dev-data:
  garage-dev-data:
  garage-dev-meta:
