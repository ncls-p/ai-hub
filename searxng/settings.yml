use_default_settings:
  engines:
    remove:
      # SearXNG 2026.6.15 made EngineAbout strict while these default
      # disabled engines still ship `about.language`, which crashes startup.
      - woxikon.de synonyme
      - wikimini

general:
  instance_name: "AI Hub Search"
  debug: false

search:
  safe_search: 1
  formats:
    - html
    - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "ai-hub-searxng-change-me"
  limiter: false
  image_proxy: false

outgoing:
  request_timeout: 5.0
